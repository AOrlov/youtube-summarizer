version: '3.8'

networks:
  proxy:
    external: true

services:
  web:
    build: .
    networks:
      - proxy
    restart: unless-stopped
    env_file:
      - stack.env
    volumes:
      - summarizer_cache:/app/cache
      - summarizer_output:/app/output

volumes:
  summarizer_cache:
  summarizer_output:
