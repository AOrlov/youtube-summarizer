<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Video Summarizer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.6/dist/purify.min.js"></script>
    <style>
        .summary-container {
            word-wrap: break-word;
        }

        .summary-container pre {
            background-color: #f8f9fa;
            padding: 1rem;
            border-radius: 0.25rem;
        }

        .summary-container code {
            background-color: #f8f9fa;
            padding: 0.2rem 0.4rem;
            border-radius: 0.25rem;
        }

        .transcript-container {
            background-color: #f8f9fa;
            border-radius: 0.25rem;
            padding: 1rem;
            white-space: pre-wrap;
            word-wrap: break-word;
            max-height: 450px;
            overflow-y: auto;
            font-family: SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        }

        .results-card {
            transition: box-shadow 0.2s ease;
        }

        .results-card:hover {
            box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.05);
        }

        .intake-grid {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto auto;
            gap: 0.85rem;
            align-items: end;
        }

        .intake-label {
            display: block;
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #6c757d;
            margin-bottom: 0.4rem;
        }

        .language-control {
            min-width: 8.5rem;
        }

        .helper-copy {
            padding-left: 0.1rem;
        }

        @media (max-width: 767.98px) {
            .intake-grid {
                grid-template-columns: 1fr;
            }

            .language-control {
                min-width: 0;
            }

            .language-control .form-select,
            .intake-grid .btn {
                width: 100%;
            }
        }
    </style>
</head>

<body>
    <div class="container mt-5">
        <h1 class="text-center mb-4">YouTube Video Summarizer</h1>

        <div class="row justify-content-center">
            <div class="col-md-11 col-lg-10 col-xl-9">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <form id="summarizeForm">
                            <div class="intake-grid">
                                <div>
                                    <label for="videoUrl" class="form-label">YouTube Video URL</label>
                                    <input type="url" class="form-control" id="videoUrl" placeholder="https://www.youtube.com/watch?v=..." required>
                                </div>
                                <div class="language-control">
                                    <label for="summaryLanguage" class="intake-label">Output</label>
                                    <select class="form-select" id="summaryLanguage" aria-label="Summary language">
                                        {% for value, label in summary_language_options %}
                                        <option value="{{ value }}"{% if value == default_summary_language %} selected{% endif %}>{{ label }}</option>
                                        {% endfor %}
                                    </select>
                                </div>
                                <div>
                                    <button type="submit" class="btn btn-primary">Summarize</button>
                                </div>
                            </div>
                            <div class="helper-copy mt-2">
                                <small class="text-muted">You will always get the full transcript for copying.</small>
                            </div>
                        </form>
                    </div>
                </div>

                <div class="alert alert-danger mt-4 d-none" id="errorAlert"></div>

                <div class="card mt-4 results-card shadow-sm d-none" id="resultCard">
                    <div class="card-body">
                        <div class="d-flex align-items-center justify-content-between flex-wrap gap-2 mb-3">
                            <div>
                                <h5 class="mb-1">Summary</h5>
                                <p class="text-muted small mb-0" id="summaryModelLabel">Generated by {{ model_name }}</p>
                            </div>
                            <div class="d-flex align-items-center gap-2">
                                <span class="text-muted small">Summary language</span>
                                <span class="badge bg-primary d-none" id="summaryLanguageBadge"></span>
                            </div>
                        </div>

                        <div class="alert alert-warning d-none" id="summaryNotice">
                            <div class="d-flex align-items-center justify-content-between flex-wrap gap-2">
                                <span id="summaryNoticeText"></span>
                                <button type="button" class="btn btn-sm btn-outline-dark d-none" id="resummarizeBtn">
                                    Re-summarize
                                </button>
                            </div>
                        </div>

                        <div class="summary-container" id="summary"></div>

                        <hr class="my-4">

                        <div class="d-flex align-items-center justify-content-between flex-wrap gap-2 mb-2">
                            <div>
                                <h5 class="mb-1">Transcript</h5>
                                <p class="text-muted small mb-0">Copy/paste here if the summary API is rate-limited.</p>
                            </div>
                            <div class="d-flex align-items-center gap-2">
                                <span class="text-muted small">Transcript language</span>
                                <span class="badge bg-secondary d-none" id="transcriptLanguageBadge"></span>
                                <button type="button" class="btn btn-sm btn-outline-secondary" id="copyTranscriptBtn">
                                    Copy transcript
                                </button>
                            </div>
                        </div>

                        <div class="transcript-container" id="transcript"></div>
                    </div>
                </div>

                <div class="card mt-4" id="progressCard" style="display: none;">
                    <div class="card-body">
                        <div class="progress">
                            <div class="progress-bar progress-bar-striped progress-bar-animated" role="progressbar"
                                style="width: 100%"></div>
                        </div>
                        <p class="text-center mt-2 mb-0">Fetching transcript and summary...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const summarizeForm = document.getElementById('summarizeForm');
        const videoUrlInput = document.getElementById('videoUrl');
        const summaryLanguageSelect = document.getElementById('summaryLanguage');
        const resultCard = document.getElementById('resultCard');
        const progressCard = document.getElementById('progressCard');
        const summaryElement = document.getElementById('summary');
        const transcriptElement = document.getElementById('transcript');
        const copyTranscriptBtn = document.getElementById('copyTranscriptBtn');
        const summaryLanguageBadge = document.getElementById('summaryLanguageBadge');
        const transcriptLanguageBadge = document.getElementById('transcriptLanguageBadge');
        const summaryModelLabel = document.getElementById('summaryModelLabel');
        const summaryNotice = document.getElementById('summaryNotice');
        const summaryNoticeText = document.getElementById('summaryNoticeText');
        const resummarizeBtn = document.getElementById('resummarizeBtn');
        const errorAlert = document.getElementById('errorAlert');
        const allowQueryAutoSubmit = {{ allow_query_autosubmit | tojson }};
        const configuredModelName = {{ model_name | tojson }};
        const summaryLanguageLabels = {
            en: 'English',
            ru: 'Russian'
        };

        const setLoading = (isLoading) => {
            progressCard.style.display = isLoading ? 'block' : 'none';
        };

        const resetUI = () => {
            errorAlert.classList.add('d-none');
            resultCard.classList.add('d-none');
            summaryNotice.classList.add('d-none');
            summaryLanguageBadge.classList.add('d-none');
            transcriptLanguageBadge.classList.add('d-none');
            summaryModelLabel.textContent = `Generated by ${configuredModelName}`;
            summaryNoticeText.textContent = '';
            resummarizeBtn.classList.add('d-none');
            resummarizeBtn.textContent = 'Re-summarize';
            summaryElement.textContent = '';
            transcriptElement.textContent = '';
            copyTranscriptBtn.disabled = true;
            copyTranscriptBtn.textContent = 'Copy transcript';
        };

        const formatLanguageLabel = (languageCode) => {
            if (!languageCode) {
                return '';
            }

            return summaryLanguageLabels[languageCode] || languageCode.toUpperCase();
        };

        const showSummaryNotice = (message, canRegenerate, currentModelName) => {
            summaryNoticeText.textContent = message;
            if (canRegenerate) {
                resummarizeBtn.textContent = currentModelName
                    ? `Re-summarize with ${currentModelName}`
                    : 'Re-summarize';
                resummarizeBtn.classList.remove('d-none');
            } else {
                resummarizeBtn.classList.add('d-none');
            }
            summaryNotice.classList.remove('d-none');
        };

        const canUseAsyncClipboard = () =>
            Boolean(window.isSecureContext && navigator.clipboard?.writeText);

        const legacyCopy = (text) => {
            try {
                const textarea = document.createElement('textarea');
                textarea.value = text;
                textarea.setAttribute('readonly', '');
                textarea.style.position = 'fixed';
                textarea.style.left = '-9999px';
                document.body.appendChild(textarea);
                textarea.select();
                const success = document.execCommand('copy');
                document.body.removeChild(textarea);
                return success;
            } catch (error) {
                console.error('Fallback clipboard copy failed.', error);
                return false;
            }
        };

        const copyTextToClipboard = async (text) => {
            if (!text) {
                return false;
            }

            if (canUseAsyncClipboard()) {
                try {
                    await navigator.clipboard.writeText(text);
                    return true;
                } catch (error) {
                    console.warn('Clipboard API failed, falling back to execCommand copy.', error);
                }
            }

            return legacyCopy(text);
        };

        const renderResult = (data) => {
            const hasSummary = Boolean(data.summary);
            const hasTranscript = Boolean(data.transcript);
            const currentModelName = data.current_model_name || configuredModelName;
            const summaryModelName = data.summary_model_name;
            const summaryModelStatus = data.summary_model_status;

            if (hasSummary) {
                summaryElement.innerHTML = DOMPurify.sanitize(marked.parse(data.summary));
            } else {
                summaryElement.innerHTML = '<p class="text-muted mb-0">Summary is unavailable. Use the transcript below.</p>';
            }

            if (summaryModelName) {
                summaryModelLabel.textContent = `Generated by ${summaryModelName}`;
            } else if (hasSummary) {
                summaryModelLabel.textContent = 'Generated by unknown model';
            } else {
                summaryModelLabel.textContent = 'Summary model unavailable';
            }

            if (data.summary_error) {
                showSummaryNotice(`Summary unavailable: ${data.summary_error}`, false);
            } else if (summaryModelStatus === 'unknown') {
                showSummaryNotice(
                    'This cached summary does not record which model generated it.',
                    true,
                    currentModelName
                );
            } else if (summaryModelStatus === 'stale') {
                showSummaryNotice(
                    `This cached summary was generated by ${summaryModelName}. Current model is ${currentModelName}.`,
                    true,
                    currentModelName
                );
            }

            transcriptElement.textContent = hasTranscript ? data.transcript : 'Transcript unavailable.';
            copyTranscriptBtn.disabled = !hasTranscript;

            const transcriptLanguage = data.transcript_language || data.language;
            if (transcriptLanguage) {
                transcriptLanguageBadge.textContent = formatLanguageLabel(transcriptLanguage);
                transcriptLanguageBadge.classList.remove('d-none');
            }

            const summaryLanguage = data.summary_language || transcriptLanguage;
            if (summaryLanguage) {
                summaryLanguageBadge.textContent = formatLanguageLabel(summaryLanguage);
                summaryLanguageBadge.classList.remove('d-none');
            }

            resultCard.classList.remove('d-none');
        };

        const summarizeVideo = async ({ forceRegenerate = false } = {}) => {
            const videoUrl = videoUrlInput.value.trim();

            if (!videoUrl) {
                return;
            }

            resetUI();
            setLoading(true);

            try {
                const requestBody = {
                    video_url: videoUrl,
                    summary_language: summaryLanguageSelect.value
                };
                if (forceRegenerate) {
                    requestBody.force_regenerate = true;
                }

                const response = await fetch('/api/summarize', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(requestBody)
                });

                const data = await response.json();

                if (!response.ok || data.status === 'error') {
                    throw new Error(data.error || `Request failed with status ${response.status}`);
                }

                renderResult(data);
            } catch (error) {
                errorAlert.textContent = error.message || 'An error occurred while processing your request.';
                errorAlert.classList.remove('d-none');
            } finally {
                setLoading(false);
            }
        };

        summarizeForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            await summarizeVideo();
        });

        resummarizeBtn.addEventListener('click', async () => {
            await summarizeVideo({ forceRegenerate: true });
        });

        copyTranscriptBtn.addEventListener('click', async () => {
            const transcriptText = transcriptElement.textContent;

            const copied = await copyTextToClipboard(transcriptText);
            copyTranscriptBtn.textContent = copied ? 'Copied!' : 'Copy failed';

            setTimeout(() => {
                copyTranscriptBtn.textContent = 'Copy transcript';
            }, 1500);
        });

        const initializeFromQuery = () => {
            const params = new URLSearchParams(window.location.search);
            const prefilledUrl = params.get('video_url') || params.get('video');
            const requestedSummaryLanguage = params.get('summary_language');

            if (summaryLanguageLabels[requestedSummaryLanguage]) {
                summaryLanguageSelect.value = requestedSummaryLanguage;
            }

            if (!prefilledUrl) {
                return;
            }

            try {
                videoUrlInput.value = decodeURIComponent(prefilledUrl);
            } catch (error) {
                videoUrlInput.value = prefilledUrl;
            }

            if (!allowQueryAutoSubmit) {
                return;
            }

            // Trigger summarization automatically for direct video-entry routes.
            summarizeForm.dispatchEvent(new Event('submit', { cancelable: true }));
        };

        initializeFromQuery();
    </script>
</body>

</html>
